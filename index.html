<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Champions Draft</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Crimson+Pro:wght@300;400;600&display=swap');

    :root {
      --gold: #c9a84c;
      --silver: #9ca3af;
      --bg: radial-gradient(ellipse at top, #0a1628 0%, #060d1a 60%, #020608 100%);
      --cream: #e8dcc8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--cream);
      font-family: Georgia, serif;
    }

    button {
      font-family: inherit;
    }

    .gt {
      background: linear-gradient(135deg, #c9a84c, #f5d98b, #c9a84c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .page {
      min-height: 100vh;
      padding: 28px 16px;
    }

    .center-page {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .fade-in {
      animation: fi .5s ease;
    }

    @keyframes fi {
      from { opacity:0; transform:translateY(10px); }
      to { opacity:1; transform:none; }
    }

    .reveal {
      animation: rv .45s cubic-bezier(.34,1.56,.64,1);
    }

    @keyframes rv {
      from { opacity:0; transform:scale(.75); }
      to { opacity:1; transform:scale(1); }
    }

    .pulse {
      animation: pb 1.6s ease-in-out infinite;
    }

    @keyframes pb {
      0%,100% { box-shadow:0 0 18px rgba(201,168,76,.3); }
      50% { box-shadow:0 0 48px rgba(201,168,76,.7); }
    }

    .slide-in {
      animation: si .35s ease;
    }

    @keyframes si {
      from { opacity:0; transform:translateX(-16px); }
      to { opacity:1; transform:none; }
    }

    .btn {
      background: linear-gradient(135deg, #c9a84c, #e8b84b);
      color: #0a1628;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 17px;
      padding: 13px 44px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .btn.full {
      width: 100%;
    }

    .btn.outline {
      background: transparent;
      border: 1px solid rgba(201,168,76,.5);
      color: var(--silver);
      font-family: 'Crimson Pro', serif;
      font-size: 13px;
      padding: 8px 22px;
    }

    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .steps {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .step-num {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 6px;
      color: var(--gold);
      font-weight: 700;
      font-family: 'Playfair Display', serif;
    }

    .pitch {
      position: relative;
      width: 100%;
      max-width: 360px;
      margin: 0 auto 20px;
      aspect-ratio: 3 / 4;
      background: linear-gradient(180deg, #14532d, #166534 50%, #14532d);
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,.12);
      overflow: hidden;
    }

    .half-line {
      position: absolute;
      top: 50%;
      left: 8%;
      right: 8%;
      height: 1px;
      background: rgba(255,255,255,.22);
    }

    .box-top {
      position: absolute;
      top: 4%;
      left: 22%;
      right: 22%;
      height: 16%;
      border: 1px solid rgba(255,255,255,.18);
    }

    .box-bottom {
      position: absolute;
      bottom: 4%;
      left: 22%;
      right: 22%;
      height: 16%;
      border: 1px solid rgba(255,255,255,.18);
    }

    .slot-button {
      position: absolute;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 62px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .slot-rating {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 3px;
    }

    .slot-empty {
      background: rgba(0,0,0,.35);
      color: rgba(255,255,255,.85);
      border: 2px dashed rgba(255,255,255,.55);
      font-size: 11px;
    }

    .slot-filled {
      background: linear-gradient(135deg, #c9a84c, #e8b84b);
      color: #0a1628;
      border: 2px solid rgba(255,255,255,.7);
    }

    .slot-name {
      font-size: 9px;
      color: #fff;
      font-family: 'Crimson Pro', serif;
      font-weight: 600;
      line-height: 1.2;
      text-shadow: 0 1px 3px rgba(0,0,0,.8);
    }

    .slot-era {
      font-size: 8px;
      color: rgba(255,255,255,.6);
      font-family: 'Crimson Pro', serif;
    }

    .slot-box {
      background: rgba(255,255,255,.05);
      border: 2px solid rgba(201,168,76,.3);
      border-radius: 14px;
      padding: 28px 20px;
      text-align: center;
    }

    .slot-box.settled {
      background: linear-gradient(135deg,rgba(201,168,76,.14),rgba(201,168,76,.04));
      border-color: var(--gold);
    }

    .slot-box-value {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      font-weight: 700;
      color: var(--cream);
      min-height: 44px;
    }

    .slot-box.settled .slot-box-value {
      color: var(--gold);
    }

    .candidate-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .player-card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(201,168,76,.2);
      border-radius: 10px;
      padding: 18px;
      transition: transform .15s, box-shadow .15s;
      cursor: pointer;
    }

    .player-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(201,168,76,.2);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      color: var(--gold);
    }

    .stat-label {
      font-size: 10px;
      color: var(--silver);
    }

    .squad-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-bottom: 22px;
    }

    .squad-row {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(201,168,76,.14);
      border-radius: 6px;
      padding: 9px 11px;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .result-row {
      padding: 11px 15px;
      border-bottom: 1px solid rgba(255,255,255,.04);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .small-muted {
      color: var(--silver);
      font-family: 'Crimson Pro', serif;
    }

    @media (max-width: 480px) {
      .squad-grid {
        grid-template-columns: 1fr;
      }
      .slot-box-value {
        font-size: 26px;
      }
    }

    .group-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Crimson Pro', serif;
      font-size: 12px;
      margin-top: 8px;
    }

    .group-table th {
      color: var(--gold);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(201,168,76,.25);
      padding: 5px 4px;
    }

    .group-table td {
      padding: 5px 4px;
      border-bottom: 1px solid rgba(255,255,255,.05);
      color: var(--cream);
    }

    .group-card {
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(201,168,76,.18);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      text-align: left;
    }

    .qualified-row td {
      color: #4ade80;
      font-weight: 700;
    }

    .user-row td {
      color: var(--gold);
      font-weight: 700;
    }


    .mode-grid {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .mode-card-btn {
      width: 100%;
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(201,168,76,.35);
      border-radius: 12px;
      padding: 16px 14px;
      color: var(--cream);
      text-align: left;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, border-color .15s;
    }

    .mode-card-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201,168,76,.18);
      border-color: var(--gold);
    }

    .mode-title {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      font-size: 20px;
      margin-bottom: 5px;
    }

    .mode-desc {
      font-family: 'Crimson Pro', serif;
      color: var(--silver);
      font-size: 14px;
      line-height: 1.45;
    }

    .mode-pill {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 8px;
      border: 1px solid rgba(201,168,76,.3);
      border-radius: 999px;
      font-family: 'Crimson Pro', serif;
      color: var(--silver);
      font-size: 11px;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

  </style>
</head>

      return uniquePlayers(pool).sort((a, b) => (b.rating || 0) - (a.rating || 0));

    function decadeStart(decade) {

    function normalizeYear(twoOrFourDigit, baseCenturyStart) {
      const n = Number(twoOrFourDigit);
      if (String(twoOrFourDigit).length === 4) return n;
      const century = Math.floor(baseCenturyStart / 100) * 100;
      let full = century + n;
      if (full < baseCenturyStart - 20) full += 100;
      return full;
    }

    function playerOverlapsDecade(player, decade) {
      const start = decadeStart(decade);
      if (!start || !player || !player.years) return true;

      const end = start + 9;
      const yearsText = String(player.years).trim();

      // Handles database entries like "1960s" or "2000s".
      const explicitDecade = yearsText.match(/(\d{4})s/);
      if (explicitDecade) return Number(explicitDecade[1]) === start;

      // Handles entries like "1980-87 & 1988-96", "2004-12", "2018-", etc.
      const ranges = yearsText.match(/\d{4}\s*-\s*(?:\d{2,4})?|\d{4}/g) || [];
      if (!ranges.length) return true;

      return ranges.some(range => {
        const rawParts = range.split("-").map(s => s.trim());
        const from = Number(rawParts[0]);
        // Open-ended ranges like "2018-" should count through the current/next decade.
        const to = rawParts.length > 1
          ? (rawParts[1] ? normalizeYear(rawParts[1], from) : 2099)
          : from;
        return from <= end && to >= start;
      });
    }

      // Main draft club pool. This intentionally uses the master ALL_CLUBS list

    function databaseProgress() {
      const total = ALL_CLUBS.length;
      const completed = ALL_CLUBS.filter(c => DB[c.id] && Object.keys(DB[c.id]).length > 0).length;
      return { total, completed, missing: total - completed };

    function decadesFor(clubId) {
      if (!DB[clubId]) return [];
      const pos = POSITIONS[state.activeSlot] || "GK";
      return DRAFT_DECADES.filter(decade => getPlayers(clubId, decade, pos).length > 0);
    }

    function getPlayers(clubId, decade, pos) {
      const c = DB[clubId];
      if (!c) return [];
      const d = c[decade];
      if (!d) return [];

      // Exact position pools come first, so RB only gets RBs, CB only gets CBs,
      // LW/RW only get true wingers, and central mids do not get wingers.
      // Every pool is filtered by the selected decade so a 1960s draft cannot
      // show players whose club years belong to the 2000s/2010s/etc.
      if (d[pos] && d[pos].length) return filterPlayersForDecade(d[pos], decade);

      return filterPlayersForDecade(d[bucketOf(pos)] || [], decade);
    }

    function dash(value) {

    function spinClub() {
      const pool = clubsWithData();

      if (pool.length === 0) {
        alert("No club databases have been added yet.");
        return;
      }

      state.clubSettled = false;
      state.club = null;
      state.clubSpinning = true;
      render();

      let count = 0;
      let delay = 55;
      const total = 28 + Math.floor(Math.random() * 18);

      function tick() {
        state.clubIdx = Math.floor(Math.random() * pool.length);
        count++;
        render();

        if (count < total) {
          delay = count / total > 0.65 ? Math.min(delay * 1.2, 500) : 55 + Math.random() * 25;
          state.clubTimer = setTimeout(tick, delay);
        } else {
          const fi = Math.floor(Math.random() * pool.length);
          const chosen = pool[fi];

          state.clubIdx = fi;
          state.club = chosen;
          state.clubSpinning = false;
          state.clubSettled = true;
          render();

          setTimeout(() => spinEra(chosen), 450);
        }
      }

      state.clubTimer = setTimeout(tick, delay);
    }

    function spinEra(targetClub) {
      const eras = decadesFor((targetClub || state.club).id);

      if (!eras || eras.length === 0) {
        state.eraList = [];
        state.eraSpinning = false;
        state.eraSettled = false;
        render();
        return;
      }

      state.eraList = eras;
      state.eraSettled = false;
      state.decade = null;
      state.eraSpinning = true;
      render();

      let count = 0;
      let delay = 60;
      const total = 22 + Math.floor(Math.random() * 14);

      function tick() {
        state.eraIdx = Math.floor(Math.random() * eras.length);
        count++;
        render();

        if (count < total) {
          delay = count / total > 0.65 ? Math.min(delay * 1.22, 480) : 60 + Math.random() * 28;
          state.eraTimer = setTimeout(tick, delay);
        } else {
          const fi = Math.floor(Math.random() * eras.length);
          state.eraIdx = fi;
          state.decade = eras[fi];
          state.eraSpinning = false;
          state.eraSettled = true;

        }

      state.eraTimer = setTimeout(tick, delay);

    function bestPlayersForClub(clubId) {
      const clubDb = DB[clubId];
      if (!clubDb) return [];

      const exactPositions = ["GK", "RB", "CB", "CB", "LB", "CM", "CM", "CM", "RW", "ST", "LW"];
      const used = new Set();
      const roster = [];

      exactPositions.forEach(pos => {
        const candidates = [];

        Object.keys(clubDb).forEach(decade => {
          const era = clubDb[decade] || {};
          const pool = era[pos] && era[pos].length ? era[pos] : [];

          pool.forEach(player => {
            candidates.push({ ...player, pos, bucket: bucketOf(pos), decade });
          });
        });

        const chosen = candidates
          .filter(p => !used.has(p.name))
          .sort((a, b) => b.rating - a.rating)[0];

        if (chosen) {
          used.add(chosen.name);
          roster.push(chosen);
        }
      });

      return roster;
    }

    function allTimeOpponent(club) {
      const roster = bestPlayersForClub(club.id);
      const rating = roster.length
        ? Math.round(roster.reduce((a, p) => a + p.rating, 0) / roster.length)
        : 82;

      return {
        id: club.id,
        name: club.name,
        league: club.league,
        country: club.country,
        rating,
        roster
      };
    }

    function chooseWeighted(players, bucketBias) {
      const filtered = bucketBias
        ? players.filter(p => bucketBias.includes(p.bucket))
        : players;

      const pool = filtered.length ? filtered : players;
      const total = pool.reduce((a, p) => a + Math.max(1, p.rating - 70), 0);
      let roll = Math.random() * total;

      for (const p of pool) {
        roll -= Math.max(1, p.rating - 70);
        if (roll <= 0) return p;
      }

      return pool[0];
    }

    function buildGoalEvents(team, opponent, gf, ga, matchIndex, userStats) {
      const events = [];
      const userAttackers = team.filter(s => ["RW", "ST", "LW"].includes(s.pos));
      const userMids = team.filter(s => s.pos === "CM");
      const userOutfield = team.filter(s => s.pos !== "GK");

      for (let i = 0; i < gf; i++) {
        const scorerPick = chooseWeighted(
          [...userAttackers, ...userMids, ...userOutfield].map(s => ({
            name: s.player.name,
            rating: s.player.rating,
            pos: s.pos,
            source: s
          })),
          null
        );

        const assisterPool = userOutfield
          .filter(s => s.player.name !== scorerPick.name)
          .map(s => ({
            name: s.player.name,
            rating: s.player.rating,
            pos: s.pos,
            source: s
          }));

        const assistPick = assisterPool.length && Math.random() < 0.75
          ? chooseWeighted(assisterPool, null)
          : null;

        if (!userStats[scorerPick.name]) {
          userStats[scorerPick.name] = { name: scorerPick.name, pos: scorerPick.pos, goals: 0, assists: 0, cleanSheets: 0 };
        }
        userStats[scorerPick.name].goals++;

        if (assistPick) {
          if (!userStats[assistPick.name]) {
            userStats[assistPick.name] = { name: assistPick.name, pos: assistPick.pos, goals: 0, assists: 0, cleanSheets: 0 };
          }
          userStats[assistPick.name].assists++;
        }

        events.push({
          team: "You",
          scorer: scorerPick.name,
          assist: assistPick ? assistPick.name : null,
          minute: Math.min(90, Math.max(1, Math.floor(Math.random() * 90) + 1))
        });
      }

      for (let i = 0; i < ga; i++) {
        const scorer = chooseWeighted(opponent.roster, ["ATT", "MID"]);
        const assistPool = opponent.roster.filter(p => p.name !== scorer.name && p.bucket !== "GK");
        const assist = assistPool.length && Math.random() < 0.7 ? chooseWeighted(assistPool, ["MID", "ATT", "DEF"]) : null;

        events.push({
          team: opponent.name,
          scorer: scorer ? scorer.name : "Unknown",
          assist: assist ? assist.name : null,
          minute: Math.min(90, Math.max(1, Math.floor(Math.random() * 90) + 1))
        });
      }

      return events.sort((a, b) => a.minute - b.minute);
    }

    }

    function mp(name, pos, rating) {
      return Object.assign(
        p(name, "2025-26", "Modern", rating, "Current squad", "Modern 2025-26 squad player"),
        { pos, exactPos: pos, bucket: pos, modernOnly: true }
      );
    }

    function modernClubList() {
      return Object.values(MODERN_UCL_2025_26).map(team => ({
        id: team.id,
        name: team.name,
        league: team.league,
        country: team.country
      }));
    }

    function modernOpponent(club) {
      const modern = MODERN_UCL_2025_26[club.id];
      if (!modern) {
        return {
          name: club.name,
          rating: 78,
          roster: [
            mp(`${club.name} Goalkeeper`, "GK", 76),
            mp(`${club.name} Defender`, "CB", 76),
            mp(`${club.name} Midfielder`, "CM", 76),
            mp(`${club.name} Forward`, "ST", 76)
          ]
        };
      }

      return {
        name: modern.name,
        rating: modern.rating,
        roster: modern.roster.map(player => Object.assign({}, player))
      };
    }



function simulateUCL(squadRaw, phase = "full") {
      const squad = squadRaw.filter(Boolean);

      const gk = squad.filter(s => s.pos === "GK");
      const def = squad.filter(s => ["RB", "CB", "LB"].includes(s.pos));
      const mid = squad.filter(s => s.pos === "CM");
      const att = squad.filter(s => ["RW", "ST", "LW"].includes(s.pos));

      const avgOf = arr => arr.length ? arr.reduce((a, s) => a + s.player.rating, 0) / arr.length : 75;

      const teamRating = Math.round(
        avgOf(gk) * 0.15 +
        avgOf(def) * 0.25 +
        avgOf(mid) * 0.30 +
        avgOf(att) * 0.30
      );

      const userStats = {};
      squad.forEach(s => {
        userStats[s.player.name] = {
          name: s.player.name,
          pos: s.pos,
          goals: 0,
          assists: 0,
          cleanSheets: 0
        };
      });

      const opponentClubs = (state.gameMode === "modern" ? modernClubList() : clubsWithData())
        .filter(c => !squad.some(s => s.club && s.club.id === c.id))
        .sort(() => Math.random() - 0.5);

      const opponents = opponentClubs.map(c => state.gameMode === "modern" ? modernOpponent(c) : allTimeOpponent(c));
      const matches = [];
      let idx = 0;

      function penaltyShootout(userWins) {
        const winnerPens = Math.floor(Math.random() * 2) + 4;
        const loserPens = Math.max(1, winnerPens - (Math.floor(Math.random() * 3) + 1));
        return userWins ? { user: winnerPens, opponent: loserPens } : { user: loserPens, opponent: winnerPens };
      }

      function blankTableTeam(name, rating, isUser = false, roster = []) {
        return { name, rating, isUser, roster, played: 0, wins: 0, draws: 0, losses: 0, gf: 0, ga: 0, gd: 0, pts: 0 };
      }

      function applyTableResult(team, gf, ga) {
        team.played++;
        team.gf += gf;
        team.ga += ga;
        team.gd = team.gf - team.ga;
        if (gf > ga) {
          team.wins++;
          team.pts += 3;
        } else if (gf === ga) {
          team.draws++;
          team.pts += 1;
        } else {
          team.losses++;
        }
      }

      function sortTable(table) {
        return [...table].sort((a, b) =>
          b.pts - a.pts ||
          b.gd - a.gd ||
          b.gf - a.gf ||
          b.rating - a.rating ||
          a.name.localeCompare(b.name)
        );
      }

      function simulateSingleGame(opponent, pressureDrop, legLabel) {
        const ratingGap = teamRating - opponent.rating;
        const winChance = Math.min(0.82, Math.max(0.22, 0.52 + ratingGap / 120 - pressureDrop));

        const r = Math.random();
        const result = r < winChance ? "W" : r < winChance + 0.16 ? "D" : "L";

        let gf;
        let ga;

        if (result === "W") {
          gf = Math.floor(Math.random() * 3) + 1;
          ga = Math.floor(Math.random() * Math.max(1, gf));
        } else if (result === "D") {
          gf = Math.floor(Math.random() * 3);
          ga = gf;
        } else {
          gf = Math.floor(Math.random() * 2);
          ga = Math.floor(Math.random() * 3) + 1;
          if (ga <= gf) ga = gf + 1;
        }

        const goalEvents = buildGoalEvents(squad, opponent, gf, ga, matches.length, userStats)
          .map(e => ({ ...e, leg: legLabel || null }));

        if (ga === 0) {
          gk.forEach(s => {
            if (userStats[s.player.name]) userStats[s.player.name].cleanSheets++;
          });
        }

        return { gf, ga, result, goalEvents };
      }

      function neutralGame(teamA, teamB) {
        const gap = (teamA.rating || 82) - (teamB.rating || 82);
        const aWin = Math.min(0.72, Math.max(0.24, 0.45 + gap / 140));
        const r = Math.random();

        let gfA, gfB;
        if (r < aWin) {
          gfA = Math.floor(Math.random() * 3) + 1;
          gfB = Math.floor(Math.random() * Math.max(1, gfA));
        } else if (r < aWin + 0.22) {
          gfA = Math.floor(Math.random() * 3);
          gfB = gfA;
        } else {
          gfA = Math.floor(Math.random() * 2);
          gfB = Math.floor(Math.random() * 3) + 1;
          if (gfB <= gfA) gfB = gfA + 1;
        }

        return { gfA, gfB };
      }

      function playGroupMatch(round, opponent, table) {
        const game = simulateSingleGame(opponent, 0, null);
        const userTeam = table.find(t => t.isUser);
        const oppTeam = table.find(t => t.name === opponent.name);

        applyTableResult(userTeam, game.gf, game.ga);
        applyTableResult(oppTeam, game.ga, game.gf);

        const match = {
          round,
          opponent: opponent.name,
          opponentRating: opponent.rating,
          opponentRoster: opponent.roster,
          score: `${game.gf}-${game.ga}`,
          regularScore: `${game.gf}-${game.ga}`,
          result: game.result,
          goalEvents: game.goalEvents,
          stageType: "group"
        };

        matches.push(match);
        return match;
      }

      function simulateGroupTables() {
        const groupLetters = ["A", "B", "C", "D"];
        const pool = [...opponents].sort(() => Math.random() - 0.5);
        const userGroupOpponents = pool.splice(0, 3);
        const groups = [];

        const userGroup = [
          blankTableTeam("Your XI", teamRating, true, squad.map(s => s.player)),
          ...userGroupOpponents.map(o => blankTableTeam(o.name, o.rating, false, o.roster))
        ];

        const userFixtures = [
          [0, 1], [2, 3],
          [0, 2], [1, 3],
          [0, 3], [1, 2],
          [1, 0], [3, 2],
          [2, 0], [3, 1],
          [3, 0], [2, 1]
        ];

        userFixtures.forEach((fixture, i) => {
          const [a, b] = fixture;
          if (a === 0 || b === 0) {
            const opponentTeam = a === 0 ? userGroup[b] : userGroup[a];
            const opponent = userGroupOpponents.find(o => o.name === opponentTeam.name);
            const m = playGroupMatch(`Group Stage ${i + 1}`, opponent, userGroup);

            if (b === 0) {
              const [forUser, forOpp] = m.score.split("-").map(Number);
              m.score = `${forUser}-${forOpp}`;
              m.regularScore = m.score;
            }
          } else {
            const game = neutralGame(userGroup[a], userGroup[b]);
            applyTableResult(userGroup[a], game.gfA, game.gfB);
            applyTableResult(userGroup[b], game.gfB, game.gfA);
          }
        });

        groups.push({ name: "Group A", userGroup: true, teams: sortTable(userGroup) });

        for (let g = 1; g < groupLetters.length; g++) {
          const groupOpps = pool.splice(0, 4);
          while (groupOpps.length < 4) groupOpps.push(opponents[(idx++ + g) % opponents.length]);

          const table = groupOpps.map(o => blankTableTeam(o.name, o.rating, false, o.roster));
          const fixtures = [[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]];

          fixtures.forEach(([a, b]) => {
            const game = neutralGame(table[a], table[b]);
            applyTableResult(table[a], game.gfA, game.gfB);
            applyTableResult(table[b], game.gfB, game.gfA);
          });

          groups.push({ name: `Group ${groupLetters[g]}`, userGroup: false, teams: sortTable(table) });
        }

        return groups;
      }

      function playTwoLegTie(round, pressureDrop) {
        const opponent = opponents[idx++ % opponents.length];
        const ratingGap = teamRating - opponent.rating;

        const leg1 = simulateSingleGame(opponent, pressureDrop, "Leg 1");
        const leg2 = simulateSingleGame(opponent, pressureDrop + 0.01, "Leg 2");

        const aggUser = leg1.gf + leg2.gf;
        const aggOpponent = leg1.ga + leg2.ga;

        let result;
        let penalties = null;

        if (aggUser > aggOpponent) {
          result = "W";
        } else if (aggUser < aggOpponent) {
          result = "L";
        } else {
          const shootoutWinChance = Math.min(0.72, Math.max(0.28, 0.50 + ratingGap / 180));
          const userWinsPens = Math.random() < shootoutWinChance;
          penalties = penaltyShootout(userWinsPens);
          result = userWinsPens ? "W" : "L";
        }

        const match = {
          round,
          opponent: opponent.name,
          opponentRating: opponent.rating,
          opponentRoster: opponent.roster,
          twoLegged: true,
          leg1Score: `${leg1.gf}-${leg1.ga}`,
          leg2Score: `${leg2.gf}-${leg2.ga}`,
          aggregateScore: `${aggUser}-${aggOpponent}`,
          penalties,
          regularScore: `${aggUser}-${aggOpponent}`,
          score: `Leg 1: ${leg1.gf}-${leg1.ga} | Leg 2: ${leg2.gf}-${leg2.ga} | Agg: ${aggUser}-${aggOpponent}${penalties ? ` | Pens: ${penalties.user}-${penalties.opponent}` : ""}`,
          result,
          stageType: "knockout",
          goalEvents: [...leg1.goalEvents, ...leg2.goalEvents].sort((a, b) => {
            const aLeg = a.leg === "Leg 2" ? 100 : 0;
            const bLeg = b.leg === "Leg 2" ? 100 : 0;
            return (aLeg + a.minute) - (bLeg + b.minute);
          })
        };

        matches.push(match);
        return match;
      }

      function playFinal(round, pressureDrop) {
        const opponent = opponents[idx++ % opponents.length];
        const ratingGap = teamRating - opponent.rating;
        const game = simulateSingleGame(opponent, pressureDrop, null);

        let result = game.result;
        let penalties = null;

        if (result === "D") {
          const shootoutWinChance = Math.min(0.72, Math.max(0.28, 0.50 + ratingGap / 180));
          const userWinsPens = Math.random() < shootoutWinChance;
          penalties = penaltyShootout(userWinsPens);
          result = userWinsPens ? "W" : "L";
        }

        const match = {
          round,
          opponent: opponent.name,
          opponentRating: opponent.rating,
          opponentRoster: opponent.roster,
          final: true,
          regularScore: `${game.gf}-${game.ga}`,
          penalties,
          score: `${game.gf}-${game.ga}${penalties ? ` | Pens: ${penalties.user}-${penalties.opponent}` : ""}`,
          result,
          stageType: "knockout",
          goalEvents: game.goalEvents
        };

        matches.push(match);
        return match;
      }

      const groups = simulateGroupTables();
      const userGroup = groups.find(g => g.userGroup);
      const userPosition = userGroup.teams.findIndex(t => t.isUser) + 1;
      const qualified = userPosition > 0 && userPosition <= 2;
      const groupPoints = userGroup.teams.find(t => t.isUser)?.pts || 0;

      const groupOnlyResult = {
        won: false,
        phase: "group",
        qualified,
        readyForKnockouts: qualified,
        finalPosition: qualified ? "Qualified" : "Group Stage",
        matches,
        groupMatches: matches.filter(m => m.stageType === "group"),
        knockoutMatches: [],
        groups,
        mvp: Object.values(userStats).sort((a, b) => b.goals - a.goals || b.assists - a.assists)[0]?.name || squad[0].player.name,
        teamRating,
        playerStats: Object.values(userStats),
        narrative: qualified
          ? `You finished ${userPosition}${userPosition === 1 ? "st" : "nd"} in the group with ${groupPoints} points.`
          : `You finished ${userPosition || 4}th in the group with ${groupPoints} points and were eliminated.`
      };

      if (phase === "group") {
        return groupOnlyResult;
      }

      if (!qualified) {
        return groupOnlyResult;
      }

      const knockoutRounds = [
        ["Round of 16", 0.04],
        ["Quarter-Final", 0.06],
        ["Semi-Final", 0.08]
      ];

      let elim = false;

      for (const [round, pressureDrop] of knockoutRounds) {
        const m = playTwoLegTie(round, pressureDrop);
        if (m.result !== "W") {
          elim = true;
          break;
        }
      }

      if (!elim) {
        const final = playFinal("Final", 0.12);
        if (final.result !== "W") elim = true;
      }

      const last = matches[matches.length - 1];
      const finalPosition = elim ? (last.round === "Final" ? "Runner-up" : last.round) : "Winner";
      const topScorer = Object.values(userStats).sort((a, b) => b.goals - a.goals || b.assists - a.assists)[0]?.name || squad[0].player.name;

      return {
        won: finalPosition === "Winner",
        phase: "complete",
        qualified,
        finalPosition,
        matches,
        groupMatches: matches.filter(m => m.stageType === "group"),
        knockoutMatches: matches.filter(m => m.stageType === "knockout"),
        groups,
        mvp: topScorer,
        teamRating,
        playerStats: Object.values(userStats),
        narrative:
          finalPosition === "Winner"
            ? "Your legendary XI conquered Europe and lifted the Champions League trophy."
            : `Your squad made it through the group, but the journey ended in the ${finalPosition}.`
      };
    }

    async function runSim() {
      state.simulating = true;
      state.simPhase = "group";
      state.simLog = [];
      state.simResult = null;
      state.screen = "simulating";
      render();

      const result = simulateUCL(state.squad, "group");

      for (let i = 0; i < result.groupMatches.length; i++) {
        await new Promise(r => setTimeout(r, 500));
        state.simLog.push(result.groupMatches[i]);
        render();
      }

      state.simResult = result;
      state.simulating = false;
      state.screen = "simulating";
      render();
    }

    async function runKnockouts() {
      state.simulating = true;
      state.simPhase = "knockout";
      state.simLog = [];
      state.screen = "simulating";
      render();

      const result = simulateUCL(state.squad, "knockout", state.simResult);
      const knockoutMatches = result.knockoutMatches || [];

      for (let i = 0; i < knockoutMatches.length; i++) {
        await new Promise(r => setTimeout(r, 650));
        state.simLog.push(knockoutMatches[i]);
        render();
      }

      state.simResult = result;
      state.simulating = false;
      state.screen = "simulating";
      render();
    }

    function playerStats(player, pos) {
      const s = player.bestSeason || {};
      let stats;

      if (pos === "GK") {
        stats = [
          ["Season", s.season],
          ["Games", s.games],
          ["Clean Sheets", s.cleanSheets],
          ["Saves", s.saves],
          ["Save %", s.savePct]
        ];
      } else if (["RB", "CB", "LB"].includes(pos)) {
        stats = [
          ["Season", s.season],
          ["Games", s.games],
          ["Goals", s.goals],

    function rerollTeam() {
      if (state.rerolls <= 0) return;

      const pos = POSITIONS[state.activeSlot];
      const pool = clubsWithData();
      const currentClub = pool[state.clubIdx];
      const lockedEra = state.eraList[state.eraIdx];

      if (!lockedEra) return;

      const validClubIndexes = pool
        .map((club, idx) => ({ club, idx }))
        .filter(item => {
          const era = DB[item.club.id] && DB[item.club.id][lockedEra];
          return era && Array.isArray(era[pos]) && era[pos].length > 0;
        })
        .filter(item => !currentClub || item.club.id !== currentClub.id || pool.length === 1);

      if (!validClubIndexes.length) return;

      const selected = validClubIndexes[Math.floor(Math.random() * validClubIndexes.length)];

      state.rerolls--;
      state.clubIdx = selected.idx;
      state.eraList = [lockedEra];
      state.eraIdx = 0;
      state.clubSettled = true;
      state.eraSettled = true;
      state.clubSpinning = false;
      state.eraSpinning = false;
      render();
    }

    function rerollEra() {
      if (state.rerolls <= 0) return;

      const pos = POSITIONS[state.activeSlot];
      const pool = clubsWithData();
      const lockedClub = pool[state.clubIdx];

      if (!lockedClub || !DB[lockedClub.id]) return;

      const currentEra = state.eraList[state.eraIdx];
      const possibleEras = Object.keys(DB[lockedClub.id]).filter(decade => {
        const era = DB[lockedClub.id][decade];
        return era && Array.isArray(era[pos]) && era[pos].length > 0;
      });

      if (!possibleEras.length) return;

      let eras = possibleEras;
      if (currentEra && possibleEras.length > 1) {
        eras = possibleEras.filter(decade => decade !== currentEra);
      }

      const newEra = eras[Math.floor(Math.random() * eras.length)];

      state.rerolls--;
      state.eraList = [newEra];
      state.eraIdx = 0;
      state.clubSettled = true;
      state.eraSettled = true;
      state.clubSpinning = false;
      state.eraSpinning = false;
      render();
    }

    function render() {

      else if (state.screen === "lineup") app.innerHTML = lineupScreen();
      else if (state.screen === "spin") app.innerHTML = spinScreen();
      else if (state.screen === "drafting") app.innerHTML = draftingScreen();
      else if (state.screen === "squad") app.innerHTML = squadScreen();
      else if (state.screen === "simulating") app.innerHTML = simulatingScreen();
      else if (state.screen === "groupResult" && state.simResult) app.innerHTML = groupResultScreen();
      else if (state.screen === "result" && state.simResult) app.innerHTML = resultScreen();
      else app.innerHTML = introScreen();
    }

    // FULL DATABASE AUDIT + AUTO-FIX
    // Ensures every active club has every era and multiple exact-position options.
    (function auditAndFixAllClubEraPositionDepth() {
      const REQUIRED_ERAS = ["1960s", "1970s", "1980s", "1990s", "2000s", "2010s", "2020s"];
      const REQUIRED_POSITIONS = ["GK", "RB", "CB", "LB", "CM", "RW", "ST", "LW"];
      const MIN_OPTIONS_PER_POSITION = 3;

      function cloneForPosition(player, club, era, pos, idx) {
        const baseName = player && player.name ? player.name : `${club.name} ${pos} Depth ${idx + 1}`;
        const copied = Object.assign(
          p(
            baseName,
            player && player.years ? player.years : era,
            player && player.nat ? player.nat : "Club Legend",
            player && player.rating ? Math.max(72, Math.min(94, player.rating - (idx % 2))) : 78,
            player && player.trait ? player.trait : "Depth option",
            player && player.note ? player.note : `${club.name} roster depth option for ${era}`,
          ),
          {
            pos,
            exactPos: pos,
            bucket: pos,
            depthPatched: true
          }
        );

        return copied;
      }

      function genericPlayer(club, era, pos, idx) {
        const labels = {
          GK: "Goalkeeper",
          RB: "Right Back",
          CB: "Centre Back",
          LB: "Left Back",
          CM: "Central Mid",
          RW: "Right Wing",
          ST: "Striker",
          LW: "Left Wing"
        };

        return Object.assign(
          p(
            `${club.name} ${era} ${labels[pos]} ${idx + 1}`,
            era,
            "Club Legend",
            76 + Math.max(0, 3 - idx),
            "Depth option",
            `${club.name} ${era} ${labels[pos]} depth option`
          ),
          {
            pos,
            exactPos: pos,
            bucket: pos,
            depthPatched: true
          }
        );
      }

      function uniqueByName(players) {
        const seen = new Set();
        return players.filter(player => {
          if (!player || !player.name) return false;
          const key = player.name + "|" + (player.pos || player.exactPos || "");
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }

      function refreshEra(era) {
        era.DEF = [...(era.RB || []), ...(era.CB || []), ...(era.LB || [])];
        era.MID = [...(era.CM || [])];
        era.ATT = [...(era.RW || []), ...(era.ST || []), ...(era.LW || [])];
      }

      function clubPoolByPosition(clubId) {
        const pool = {};
        REQUIRED_POSITIONS.forEach(pos => pool[pos] = []);

        const clubDb = DB[clubId] || {};
        Object.values(clubDb).forEach(era => {
          if (!era || typeof era !== "object") return;

          REQUIRED_POSITIONS.forEach(pos => {
            if (Array.isArray(era[pos])) {
              era[pos].forEach(player => {
                if (player) pool[pos].push(player);
              });
            }
          });

          // Also mine old generic groups just in case.
          if (Array.isArray(era.DEF)) {
            era.DEF.forEach(player => {
              const pos = player.exactPos || player.pos;
              if (["RB", "CB", "LB"].includes(pos)) pool[pos].push(player);
            });
          }
          if (Array.isArray(era.MID)) {
            era.MID.forEach(player => {
              const pos = player.exactPos || player.pos || "CM";
              if (pos === "CM") pool.CM.push(player);
            });
          }
          if (Array.isArray(era.ATT)) {
            era.ATT.forEach(player => {
              const pos = player.exactPos || player.pos;
              if (["RW", "ST", "LW"].includes(pos)) pool[pos].push(player);
            });
          }
        });

        REQUIRED_POSITIONS.forEach(pos => {
          pool[pos] = uniqueByName(pool[pos]);
        });

        return pool;
      }

      function fallbackPoolByLine(clubId, pos) {
        const clubDb = DB[clubId] || {};
        const linePositions =
          pos === "GK" ? ["GK"] :
          ["RB", "CB", "LB"].includes(pos) ? ["RB", "CB", "LB"] :
          pos === "CM" ? ["CM"] :
          ["RW", "ST", "LW"];

        const players = [];
        Object.values(clubDb).forEach(era => {
          if (!era || typeof era !== "object") return;
          linePositions.forEach(pKey => {
            if (Array.isArray(era[pKey])) players.push(...era[pKey]);
          });
        });
        return uniqueByName(players);
      }

      const auditBefore = [];
      const auditAfter = [];

      ALL_CLUBS.forEach(club => {
        if (!DB[club.id]) DB[club.id] = {};
        const clubDb = DB[club.id];

        REQUIRED_ERAS.forEach(eraName => {
          if (!clubDb[eraName]) {
            auditBefore.push(`${club.name}: missing ${eraName}`);
            clubDb[eraName] = {};
          }
        });

        let pool = clubPoolByPosition(club.id);

        REQUIRED_ERAS.forEach(eraName => {
          const era = clubDb[eraName];
          REQUIRED_POSITIONS.forEach(pos => {
            if (!Array.isArray(era[pos])) era[pos] = [];

            era[pos] = era[pos].map(player => Object.assign(player, {
              pos,
              exactPos: pos,
              bucket: pos
            }));

            era[pos] = uniqueByName(era[pos]);

            if (era[pos].length < MIN_OPTIONS_PER_POSITION) {
              auditBefore.push(`${club.name} ${eraName}: only ${era[pos].length} ${pos}`);

              let sourcePool = pool[pos].length ? pool[pos] : fallbackPoolByLine(club.id, pos);
              let attempts = 0;

              while (era[pos].length < MIN_OPTIONS_PER_POSITION && attempts < 20) {
                const source = sourcePool.length
                  ? sourcePool[(era[pos].length + attempts) % sourcePool.length]
                  : null;

                const clone = source
                  ? cloneForPosition(source, club, eraName, pos, era[pos].length)
                  : genericPlayer(club, eraName, pos, era[pos].length);

                // Keep names unique inside same position array if needed.
                if (era[pos].some(x => x.name === clone.name)) {
                  clone.name = `${clone.name} (${eraName} ${pos})`;
                }

                era[pos].push(clone);
                attempts++;
              }
            }
          });

          refreshEra(era);
        });
      });

      ALL_CLUBS.forEach(club => {
        const clubDb = DB[club.id] || {};
        REQUIRED_ERAS.forEach(eraName => {
          if (!clubDb[eraName]) auditAfter.push(`${club.name}: missing ${eraName}`);
          REQUIRED_POSITIONS.forEach(pos => {
            const count = Array.isArray(clubDb[eraName]?.[pos]) ? clubDb[eraName][pos].length : 0;
            if (count < MIN_OPTIONS_PER_POSITION) {
              auditAfter.push(`${club.name} ${eraName}: only ${count} ${pos}`);
            }
          });
        });
      });

      window.fullRosterAuditReport = {
        requiredEras: REQUIRED_ERAS,
        requiredPositions: REQUIRED_POSITIONS,
        minimumOptionsPerPosition: MIN_OPTIONS_PER_POSITION,
        issuesBeforeAutoFix: auditBefore,
        issuesAfterAutoFix: auditAfter,
        fixed: auditAfter.length === 0
      };

      window.runFullRosterAudit = function() {
        console.log("Full roster audit report:", window.fullRosterAuditReport);
        if (window.fullRosterAuditReport.issuesAfterAutoFix.length) {
          console.table(window.fullRosterAuditReport.issuesAfterAutoFix.map(issue => ({ issue })));
        } else {
          console.log("✅ Every club has every era and at least 3 options at every exact position.");
        }
        return window.fullRosterAuditReport;
      };
    })();

        const era = DB[club.id] && DB[club.id][currentEra];
        return era && Array.isArray(era[pos]) && era[pos].length > 0;
      });

      if (!clubs.length) {
        return;
      }

      let possibleClubs = clubs;
      if (state.spinClub && clubs.length > 1) {
        possibleClubs = clubs.filter(club => club.id !== state.spinClub.id);
      }

      const club = possibleClubs[Math.floor(Math.random() * possibleClubs.length)];

      state.spinClub = club;
      state.spinDecade = currentEra;
      state.candidates = DB[club.id][currentEra][pos] || [];
      state.spinning = false;
      render();

        const era = DB[club.id][decade];

      let eras = possibleDecades;

      const decade = eras[Math.floor(Math.random() * eras.length)];

      state.spinDecade = decade;
      state.candidates = DB[club.id][decade][pos] || [];
      state.spinning = false;

        .replace(/[\u0300-\u036f]/g, "")
